<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问候页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .greeting-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting-box">
            <h1>你好, <span th:text="${name}">World</span>!</h1>
            <p class="lead">欢迎使用 Spring Boot 的 Thymeleaf 模板引擎</p>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Thymeleaf 模板引擎</h5>
            </div>
            <div class="card-body">
                <p>Thymeleaf 是一个现代服务器端 Java 模板引擎，用于 Web 和独立环境。</p>
                <p>特点：</p>
                <ul>
                    <li>自然的模板 - 模板是有效的 HTML5</li>
                    <li>Spring 集成 - 与 Spring MVC 完美集成</li>
                    <li>国际化支持</li>
                    <li>片段重用</li>
                </ul>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="btn btn-primary me-2">返回首页</a>
            <a href="/api/users" class="btn btn-success me-2">查看用户 API</a>
            <a href="/hello" class="btn btn-warning">Hello World</a>
        </div>
        
        <div class="mt-4">
            <h6>尝试不同的问候：</h6>
            <a href="/greeting?name=张三" class="btn btn-outline-primary btn-sm me-2">张三</a>
            <a href="/greeting?name=李四" class="btn btn-outline-primary btn-sm me-2">李四</a>
            <a href="/greeting?name=王五" class="btn btn-outline-primary btn-sm me-2">王五</a>
            <a href="/greeting?name=Spring Boot" class="btn btn-outline-primary btn-sm">Spring Boot</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
